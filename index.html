<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric QR Label Generator</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input, select, button { display: block; margin: 10px 0; padding: 8px; width: 260px; }
    button { cursor: pointer; background-color: #4CAF50; color: white; border: none; padding: 10px 20px; }
    #qrcode { margin-top: 20px; }
  </style>
</head>
<body>

  <h2>Fabric Label Generator</h2>

  <label for="ref">Ref</label>
  <input id="ref" placeholder="Fabric Reference" required>

  <label for="batch">Batch</label>
  <input id="batch" placeholder="Batch Number" required>

  <label for="width">Width</label>
  <input id="width" placeholder="Width" required>

  <label for="color">Color</label>
  <input id="color" placeholder="Color" required>

  <label for="length">Length</label>
  <input id="length" placeholder="Length" required>

  <label for="roll">Roll Number</label>
  <input id="roll" placeholder="Roll Number" required>

  <button onclick="generateQRCode()">Generate QR + Print</button>

  <div id="qrcode"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    // Supabase API Config
    const config = {
      supabaseUrl: "https://pqpfwhjgqeajcekuulzd.supabase.co",
      apiKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcGZ3aGpncWVhamNla3V1bHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQ4MTYsImV4cCI6MjA5MTIyMDgxNn0.iv8Dre6jCfgMm5ZpF6lSYA_jWX7CUIUGkOZmkhk3_zI",
      viewUrl: "https://qr-code-eight-beige.vercel.app/view.html" // Replace with your deployed view.html URL
    };

    // Generate QR Code
    async function generateQRCode() {
      const ref = document.getElementById("ref").value;
      const batch = document.getElementById("batch").value;
      const width = document.getElementById("width").value;
      const color = document.getElementById("color").value;
      const length = document.getElementById("length").value;
      const roll = document.getElementById("roll").value;

      const id = Date.now();  // Use timestamp as a unique identifier
      const url = `${config.viewUrl}?id=${id}`;

      // Insert data into Supabase
      const res = await fetch(`${config.supabaseUrl}/rest/v1/fabric`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": config.apiKey,
          "Authorization": `Bearer ${config.apiKey}`
        },
        body: JSON.stringify({
          id, ref, batch, width, color, length, roll
        })
      });

      if (!res.ok) {
        alert("Failed to save data to Supabase.");
        return;
      }

      // Generate QR Code
      document.getElementById("qrcode").innerHTML = "";
      new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 150,
        height: 150
      });

      // Print (Mock-up step, add actual printing functionality)
      printLabel(url, ref, batch, width, color, length, roll);
    }

    // Mock-up function for printing label (replace with actual printing logic)
    function printLabel(url, ref, batch, width, color, length, roll) {
      console.log("Printing label for", { url, ref, batch, width, color, length, roll });
      alert("Label has been printed (Mock).");
    }
  </script>
</body>
</html>
