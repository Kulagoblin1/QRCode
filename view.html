<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric Information</title>
</head>
<body>

  <h2>Fabric Information</h2>

  <div id="fabric-details">
    <!-- Fabric details will be dynamically loaded here -->
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const fabricId = urlParams.get('id');

    // Check if there's an id in the URL, if not, show an error
    if (!fabricId) {
      document.getElementById("fabric-details").innerText = "No fabric ID found in the URL.";
      return;
    }

    // Fetch the fabric data from Supabase using the fabric ID
    async function fetchFabricData() {
      const res = await fetch(`https://pqpfwhjgqeajcekuulzd.supabase.co/rest/v1/fabric?id=eq.${fabricId}`, {
        method: "GET",
        headers: {
          "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcGZ3aGpncWVhamNla3V1bHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQ4MTYsImV4cCI6MjA5MTIyMDgxNn0.iv8Dre6jCfgMm5ZpF6lSYA_jWX7CUIUGkOZmkhk3_zI",
          "Authorization": `Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcGZ3aGpncWVhamNla3V1bHpkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDQ4MTYsImV4cCI6MjA5MTIyMDgxNn0.iv8Dre6jCfgMm5ZpF6lSYA_jWX7CUIUGkOZmkhk3_zI`,
          "Content-Type": "application/json"
        }
      });

      const fabricData = await res.json();

      if (fabricData.length === 0) {
        document.getElementById("fabric-details").innerText = "No data found for this fabric.";
        return;
      }

      // Display fabric details
      const fabric = fabricData[0];
      document.getElementById("fabric-details").innerHTML = `
        <p><strong>Ref:</strong> ${fabric.ref}</p>
        <p><strong>Batch:</strong> ${fabric.batch}</p>
        <p><strong>Width:</strong> ${fabric.width}</p>
        <p><strong>Color:</strong> ${fabric.color}</p>
        <p><strong>Length:</strong> ${fabric.length}</p>
        <p><strong>Roll:</strong> ${fabric.roll}</p>
      `;
    }

    fetchFabricData();
  </script>

</body>
</html>
